            - generic [ref=e152]: Combien de participantes par session ?
            - generic [ref=e153]: add
          - paragraph [ref=e154]: Le groupe est volontairement limité à 1 ou 2 participantes maximum pour garantir un suivi ultra-personnalisé et des corrections en temps réel. C'est l'un des points forts de la méthode.
        - generic [ref=e155]:
