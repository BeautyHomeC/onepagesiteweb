            - generic [ref=e148]: add
          - paragraph [ref=e149]: La formation Manucure Russe Pro est une formation de perfectionnement. Elle s'adresse aux prothésistes ongulaires et esthéticiennes ayant déjà suivi une formation initiale et maîtrisant l'utilisation d'une ponceuse. La vérification se fait sur déclaration via une attestation sur l'honneur.
