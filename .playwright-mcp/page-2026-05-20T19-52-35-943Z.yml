            - generic [ref=e143]: add
          - paragraph [ref=e144]: Les formations Beauty Home Concept sont certifiées Qualiopi, ce qui les rend éligibles aux financements FAFCEA (pour les auto-entrepreneurs du secteur), OPCO (pour les salariés) et CPF. Contactez votre organisme de financement en amont pour valider votre dossier. Une convention de formation et une attestation de fin de formation vous seront remises pour vos justificatifs.
        - generic [ref=e145]:
          - button "Quel est le niveau requis pour s'inscrire ? add" [ref=e146]:
